services:
  postgres:
    image: postgres:16-alpine
    container_name: olshop-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: olshop
    volumes:
      - olshop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d olshop']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  olshop_postgres_data:
